---
name: "Terraform Plan - tflabs002"

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read
    id-token: write

env:
    TF_IN_AUTOMATION: "true"
    TF_INPUT: "false"
    TF_VERSION: "1.14.1"

concurrency:
    group: tf-plan-${{ github.ref }}
    cancel-in-progress: false

defaults:
    run:
        shell: bash

jobs:
    tf_plan:
        name: Terraform Plan
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ./infra/terraform

        steps:
            - name: Checkout
              id: checkout-code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

